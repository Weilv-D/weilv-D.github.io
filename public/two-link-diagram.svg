<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    :root {
      --bg: #F7F3EB;
      --surface: #F0EBE1;
      --text: #4A403A;
      --primary: #2E5090;
      --secondary: #6B5B4F;
      --accent: #B89B6C;
      --grid: rgba(107, 91, 79, 0.15);
      --font-display: "Bodoni Moda", "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1C1C1E;
        --surface: #2A2A2C;
        --text: #D4CFC9;
        --primary: #4A7EC7;
        --secondary: #A89888;
        --accent: #9A8660;
        --grid: rgba(168, 152, 136, 0.15);
      }
    }
    .bg { fill: var(--bg); transition: fill 0.5s; }
    .grid-line { fill: none; stroke: var(--grid); stroke-width: 1px; }
    .border-line { fill: none; stroke: var(--grid); stroke-width: 1px; }
    .border-line-thin { fill: none; stroke: var(--grid); stroke-width: 0.5px; }
    
    .axis { stroke: var(--secondary); stroke-width: 1.5px; }
    .arrow-fill { fill: var(--secondary); }
    .gravity-arrow { stroke: var(--secondary); stroke-width: 1.5px; }
    
    .txt-title { font-family: var(--font-display); font-size: 46px; fill: var(--text); }
    .txt-sub { font-family: var(--font-display); font-size: 16px; font-style: italic; fill: var(--secondary); letter-spacing: 0.08em; }
    .txt-label { font-family: var(--font-display); font-size: 20px; font-style: italic; fill: var(--text); }
    
    .txt-accent { fill: var(--accent); }
    .txt-primary { fill: var(--primary); }
    
    .link-line { stroke: var(--primary); stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .link-dash { stroke: var(--secondary); stroke-width: 1.5px; stroke-dasharray: 6,4; }
    .arc { stroke: var(--accent); stroke-width: 1.5px; fill: none; }
    
    .joint { fill: var(--surface); stroke: var(--text); stroke-width: 2px; }
    .joint-base { fill: var(--surface); stroke: var(--text); stroke-width: 2px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L9,4 z" class="arrow-fill" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid-line" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Subtle Grid Pattern -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Magazine Editorial Boarders -->
  <rect x="20" y="20" width="760" height="460" class="border-line" />
  <rect x="24" y="24" width="752" height="452" class="border-line-thin" />
  <line x1="20" y1="150" x2="780" y2="150" class="border-line" />
  <line x1="24" y1="154" x2="776" y2="154" class="border-line-thin" />

  <!-- Typography / Titles -->
  <text x="50" y="85" class="txt-title">2R Robotic Arm</text>
  <text x="53" y="120" class="txt-sub">LAGRANGIAN DYNAMICS MODEL</text>
  <line x1="50" y1="135" x2="180" y2="135" stroke="var(--accent)" stroke-width="2" />

  <!-- Diagram (Origin shifted for aesthetic padding) -->
  <g transform="translate(360, 420) scale(1, -1)">
    
    <!-- Axes -->
    <line x1="-50" y1="0" x2="380" y2="0" class="axis" marker-end="url(#arrow)" />
    <line x1="0" y1="-40" x2="0" y2="240" class="axis" marker-end="url(#arrow)" />

    <!-- Extension line of Link 1 -->
    <line x1="106" y1="106" x2="160" y2="160" class="link-dash" />

    <!-- Arcs -->
    <!-- q1 arc (0 to 45 deg, r=60) -->
    <path d="M 60 0 A 60 60 0 0 1 42.4 42.4" class="arc" />
    <!-- q2 arc (45 to -15 deg, r=50) -->
    <path d="M 141.3 141.3 A 50 50 0 0 0 154.3 93.1" class="arc" />

    <!-- Linkages -->
    <line x1="0" y1="0" x2="106" y2="106" class="link-line" />
    <line x1="106" y1="106" x2="222" y2="75" class="link-line" />

    <!-- Joints & Masses -->
    <!-- Base Hinge -->
    <rect x="-8" y="-8" width="16" height="16" class="joint-base" rx="2" />
    <circle cx="0" cy="0" r="3" fill="var(--text)" />
    
    <!-- Joint 1 -->
    <circle cx="106" cy="106" r="6" class="joint" />
    <circle cx="106" cy="106" r="2" fill="var(--text)" />
    
    <!-- End Effector (Mass 2) -->
    <circle cx="222" cy="75" r="6" class="joint" />
    <circle cx="222" cy="75" r="2" fill="var(--text)" />

    <!-- Labels container (un-flip Y axis) -->
    <g transform="scale(1, -1)">
      <!-- Axes labels -->
      <text x="360" y="25" class="txt-label">x</text>
      <text x="-25" y="-220" class="txt-label">y</text>

      <!-- Angles -->
      <text x="70" y="-18" class="txt-label txt-accent">q₁</text>
      <text x="165" y="-120" class="txt-label txt-accent">q₂</text>

      <!-- Links -->
      <text x="40" y="-60" class="txt-label">l₁</text>
      <text x="160" y="-60" class="txt-label">l₂</text>

      <!-- Masses -->
      <text x="90" y="-120" class="txt-label">m₁</text>
      <text x="215" y="-90" class="txt-label">m₂</text>

      <!-- Gravity Vector -->
      <g transform="translate(-100, -220)">
        <line x1="0" y1="0" x2="0" y2="40" class="gravity-arrow" marker-end="url(#arrow)" />
        <text x="15" y="30" class="txt-label">g</text>
      </g>
    </g>
  </g>
</svg>
