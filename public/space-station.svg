<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    :root {
      --bg: #F7F3EB;
      --surface: #F0EBE1;
      --text: #4A403A;
      --primary: #2E5090;
      --secondary: #6B5B4F;
      --accent: #B89B6C;
      --grid: rgba(107, 91, 79, 0.15);
      --font-display: "Bodoni Moda", "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1C1C1E;
        --surface: #2A2A2C;
        --text: #D4CFC9;
        --primary: #4A7EC7;
        --secondary: #A89888;
        --accent: #9A8660;
        --grid: rgba(168, 152, 136, 0.15);
      }
    }
    .bg { fill: var(--bg); transition: fill 0.5s; }
    .grid-line { fill: none; stroke: var(--grid); stroke-width: 1px; }
    .border-line { fill: none; stroke: var(--grid); stroke-width: 1px; }
    .border-line-thin { fill: none; stroke: var(--grid); stroke-width: 0.5px; }

    .txt-title { font-family: var(--font-display); font-size: 46px; fill: var(--text); }
    .txt-sub { font-family: var(--font-display); font-size: 16px; font-style: italic; fill: var(--secondary); letter-spacing: 0.08em; }
    .txt-label { font-family: var(--font-display); font-size: 13px; fill: var(--text); letter-spacing: 0.05em; font-weight: normal; }

    .txt-accent { fill: var(--accent); }
    .txt-primary { fill: var(--primary); }

    .primary-stroke { stroke: var(--primary); fill: none; }
    .accent-stroke { stroke: var(--accent); fill: none; }
    .secondary-stroke { stroke: var(--secondary); fill: none; }

    .orbit { stroke: var(--accent); stroke-width: 1.5px; fill: none; stroke-dasharray: 6,8; }
    .module { fill: var(--surface); stroke: var(--primary); stroke-width: 1.5px; }
    .module-dark { fill: var(--text); stroke: var(--text); }
    .panel { fill: var(--bg); stroke: var(--secondary); stroke-width: 1.5px; }
    .panel-line { stroke: var(--secondary); stroke-width: 1px; fill: none; }

    .callout-line { stroke: var(--secondary); stroke-width: 1.5px; fill: none; }
    .callout-dot { fill: var(--bg); stroke: var(--secondary); stroke-width: 2px; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid-line" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Subtle Grid Pattern -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Magazine Editorial Boarders -->
  <rect x="20" y="20" width="760" height="460" class="border-line" />
  <rect x="24" y="24" width="752" height="452" class="border-line-thin" />
  <line x1="20" y1="150" x2="780" y2="150" class="border-line" />
  <line x1="24" y1="154" x2="776" y2="154" class="border-line-thin" />

  <!-- Scale Indicator -->
  <g transform="translate(670, 440)">
    <line x1="0" y1="0" x2="60" y2="0" class="secondary-stroke" stroke-width="2" />
    <line x1="0" y1="-5" x2="0" y2="5" class="secondary-stroke" stroke-width="2" />
    <line x1="60" y1="-5" x2="60" y2="5" class="secondary-stroke" stroke-width="2" />
    <text x="30" y="-10" class="txt-label" text-anchor="middle" style="font-size: 10px;">10 METERS</text>
  </g>

  <!-- Typography / Titles -->
  <text x="50" y="85" class="txt-title">Space Station</text>
  <text x="53" y="120" class="txt-sub">ORBITAL OBSERVATORY BLUEPRINT</text>
  <line x1="50" y1="135" x2="350" y2="135" class="accent-stroke" stroke-width="2" />

  <!-- Diagram Container -->
  <g transform="translate(420, 310)">
    
    <!-- Background Orbits -->
    <ellipse cx="0" cy="0" rx="300" ry="100" class="orbit" transform="rotate(-15)" />
    <ellipse cx="0" cy="0" rx="220" ry="70" class="orbit" transform="rotate(-15)" />

    <!-- Main Structural Trusses -->
    <line x1="-220" y1="0" x2="220" y2="0" class="secondary-stroke" stroke-width="5" />
    <line x1="-210" y1="-6" x2="210" y2="-6" class="secondary-stroke" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="-210" y1="6" x2="210" y2="6" class="secondary-stroke" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Solar Arrays (Left) -->
    <rect x="-200" y="-70" width="35" height="140" class="panel" />
    <rect x="-155" y="-70" width="35" height="140" class="panel" />
    <rect x="-110" y="-70" width="35" height="140" class="panel" />
    <line x1="-200" y1="-25" x2="-75" y2="-25" class="panel-line" />
    <line x1="-200" y1="25" x2="-75" y2="25" class="panel-line" />
    <line x1="-200" y1="0" x2="-75" y2="0" class="panel-line" />

    <!-- Solar Arrays (Right) -->
    <rect x="75" y="-70" width="35" height="140" class="panel" />
    <rect x="120" y="-70" width="35" height="140" class="panel" />
    <rect x="165" y="-70" width="35" height="140" class="panel" />
    <line x1="75" y1="-25" x2="200" y2="-25" class="panel-line" />
    <line x1="75" y1="25" x2="200" y2="25" class="panel-line" />
    <line x1="75" y1="0" x2="200" y2="0" class="panel-line" />

    <!-- Top Modules -->
    <rect x="-20" y="-100" width="40" height="70" class="module" rx="4" />
    <path d="M -20 -100 L 0 -130 L 20 -100 Z" class="module" />
    <circle cx="0" cy="-130" r="4" class="module" />
    <!-- Segment lines -->
    <line x1="-20" y1="-50" x2="20" y2="-50" class="primary-stroke" stroke-width="1.5" />
    <line x1="-20" y1="-80" x2="20" y2="-80" class="primary-stroke" stroke-width="1.5" />

    <!-- Telemetry Dish -->
    <g transform="translate(25, -60) rotate(15)">
      <path d="M -20 -20 Q 0 5 20 -20" class="primary-stroke" stroke-width="2" fill="var(--bg)"/>
      <line x1="0" y1="-20" x2="0" y2="2.5" class="primary-stroke" stroke-width="2" />
      <circle cx="0" cy="-20" r="3" class="module-dark" />
      <path d="M -5 -25 Q 0 -35 15 -30" class="accent-stroke" stroke-width="1.5" stroke-dasharray="2,2"/>
    </g>

    <!-- Bottom Modules -->
    <rect x="-25" y="30" width="50" height="70" class="module" rx="4" />
    <rect x="-10" y="100" width="20" height="30" class="module" />
    <path d="M -25 130 L 25 130 L 15 150 L -15 150 Z" class="module" />
    <line x1="-15" y1="140" x2="15" y2="140" class="secondary-stroke" />
    <line x1="-25" y1="60" x2="25" y2="60" class="primary-stroke" stroke-width="1.5" />

    <!-- Central Nexus Module -->
    <circle cx="0" cy="0" r="30" class="module" />
    <circle cx="0" cy="0" r="14" class="module-dark" />
    <!-- Inner Crosshair -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="var(--surface)" stroke-width="1.5" />
    <line x1="0" y1="-30" x2="0" y2="30" stroke="var(--surface)" stroke-width="1.5" />

    <!-- Callouts & Labels -->
    
    <!-- Photovoltaic Array -->
    <polyline points="-180,-80 -140,-130 -40,-130" class="callout-line" />
    <circle cx="-180" cy="-80" r="3" class="callout-dot" />
    <text x="-35" y="-126" class="txt-label">PHOTOVOLTAIC ARRAY</text>

    <!-- Habitation Nexus -->
    <polyline points="-22,0 -60,-40 -120,-40" class="callout-line" />
    <circle cx="-22" cy="0" r="3" class="callout-dot" />
    <text x="-275" y="-36" class="txt-label txt-primary">HABITATION NEXUS</text>

    <!-- Telemetry Dish -->
    <polyline points="40,-75 80,-110 160,-110" class="callout-line" />
    <circle cx="40" cy="-75" r="3" class="callout-dot" />
    <text x="165" y="-106" class="txt-label txt-accent">TELEMETRY DISH</text>

    <!-- Docking Port -->
    <polyline points="0,150 40,170 120,170" class="callout-line" />
    <circle cx="0" cy="150" r="3" class="callout-dot" />
    <text x="125" y="174" class="txt-label">DOCKING PORT (NADIR)</text>

  </g>
</svg>
